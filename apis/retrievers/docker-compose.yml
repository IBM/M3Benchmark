services:
  retriever-mcp:
    # Option 1: Build locally
    build: .
    # Option 2: Use pre-built image from Docker Hub (comment out 'build' above)
    # image: docker.io/amurthi44g1wd/retriever-mcp:latest

    container_name: retriever-mcp-server
    ports:
      - "8001:8001"
    environment:
      - FASTAPI_BASE_URL=http://localhost:8001
      - MCP_DOMAIN=${MCP_DOMAIN:-}
      - PRELOAD_COLLECTIONS=true
      # Set HF_REPO to auto-download data on first start
      - HF_REPO=${HF_REPO:-anupamamurthi/retriever-chroma-data}
    volumes:
      # Persist downloaded data across container restarts
      - chroma_data:/app/chroma_data
      - queries_data:/app/queries
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    stdin_open: true
    tty: true

volumes:
  chroma_data:
  queries_data:
